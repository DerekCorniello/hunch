name: Feature request
description: Suggest a change or addition to hunch
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that hunch makes hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: non-goals
    attributes:
      label: Scope check
      description: >
        Hunch has deliberate non-goals (see the README). Requests for AI/LLM
        prediction, cloud sync, telemetry, or a daemon-less mode are out of scope.
      options:
        - label: I have read the non-goals and this request does not fall under them
          required: true
