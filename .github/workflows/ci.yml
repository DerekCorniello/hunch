name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./... -race -count=1 -timeout=120s
      - run: go test -coverprofile=/tmp/c.out ./core/... ./ipc/...
        if: matrix.os == 'ubuntu-latest'

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: golangci-lint run ./...

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: GOOS=linux   GOARCH=amd64 go build -o /dev/null ./...
      - run: GOOS=darwin  GOARCH=amd64 go build -o /dev/null ./...
      - run: GOOS=windows GOARCH=amd64 go build -o /dev/null ./...
      - run: GOOS=linux   GOARCH=arm64 go build -o /dev/null ./...
      - run: GOOS=darwin  GOARCH=arm64 go build -o /dev/null ./...
