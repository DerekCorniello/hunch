name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ['1.25']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
      - run: go mod verify
      - run: go vet ./...
      - run: go test ./core/... -race -count=1 -timeout=120s
      - run: go test ./daemon/... -race -count=1 -timeout=120s
      - run: go test ./cli/... ./ipc/... -race -count=1 -timeout=120s
        if: matrix.os != 'windows-latest'
      - name: CLI + IPC tests (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $tmpdir = "${{ runner.temp }}\gotmp"
          New-Item -ItemType Directory -Force -Path $tmpdir | Out-Null
          $env:GOTMPDIR = $tmpdir
          $cli = go test ./cli/... -race -count=1 -timeout=120s
          $cli
          if ($cli -match '\bFAIL\b') { exit 1 }
          $ipc = go test ./ipc/... -race -count=1 -timeout=120s
          $ipc
          if ($ipc -match '\bFAIL\b') { exit 1 }
      - run: go test -coverprofile=/tmp/c.out ./core/... ./ipc/...
        if: matrix.os == 'ubuntu-latest'

  integration:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Install zsh
        run: sudo apt-get update && sudo apt-get install -y zsh
      - name: zsh integration logic tests
        run: zsh integrations/zsh/hunch_test.zsh
      - name: End-to-end CLI/daemon smoke test
        run: bash scripts/e2e-test.sh

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
      - run: golangci-lint run ./...

  cross-compile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: GOOS=linux   GOARCH=amd64 go build -o /dev/null ./...
      - run: GOOS=darwin  GOARCH=amd64 go build -o /dev/null ./...
      - run: GOOS=windows GOARCH=amd64 go build -o /dev/null ./...
      - run: GOOS=linux   GOARCH=arm64 go build -o /dev/null ./...
      - run: GOOS=darwin  GOARCH=arm64 go build -o /dev/null ./...
